<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWBTD - Daily Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>WWBTD Planner</h1>
            <p id="current-date"></p>
        </header>
        
        <section class="input-section">
            <input type="text" id="todo-input" placeholder="오늘 할 일을 입력하세요...">
            <button id="add-btn">추가</button>
        </section>

        <section class="list-section">
            <ul id="todo-list">
                <!-- 할 일 목록이 여기에 추가됨 -->
            </ul>
        </section>

        <hr class="divider">

        <section class="contact-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/meerjjdy" method="POST">
                <div class="form-group">
                    <label for="name">성함 / 업체명</label>
                    <input type="text" name="name" id="name" required placeholder="홍길동 / (주)WWBTD">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" name="_replyto" id="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea name="message" id="message" rows="4" required placeholder="제휴 제안 내용을 입력해주세요."></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
