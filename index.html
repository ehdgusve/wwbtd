<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWBTD - Strategic Life Planner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="home-logo" onclick="goHome()">WWBTD</div>

    <div class="top-settings">
        <select id="lang-select"><option value="ko">KO</option><option value="en">EN</option></select>
        <div class="color-picker-wrapper"><input type="color" id="base-color" value="#5E7B61"></div>
    </div>

    <!-- 1. Landing Page -->
    <div id="landing-page" class="landing-page">
        <div class="landing-content">
            <header class="landing-header">
                <h1 data-i18n="app_name">WWBTD</h1>
                <p data-i18n="landing_subtitle">성취를 위한 전략적 시간 관리의 시작</p>
            </header>
            <div class="guide-grid">
                <div class="guide-card clickable" onclick="showGuide(1)"><i class="fa-solid fa-seedling icon"></i><h3 data-i18n="step1_title">Brain Dump</h3></div>
                <div class="guide-card clickable" onclick="showGuide(2)"><i class="fa-solid fa-compass icon"></i><h3 data-i18n="step2_title">Prioritize</h3></div>
            </div>
            <div id="login-section" class="login-box card">
                <form id="login-form">
                    <input type="text" id="username" placeholder="Your Name" required>
                    <button type="submit" class="btn-primary" data-i18n="enter_btn">Get Started</button>
                </form>
            </div>
            <div id="go-planner-section" style="display: none;">
                <button class="btn-primary" onclick="goToPlanner()">Go to My Planner &rarr;</button>
            </div>
        </div>
    </div>

    <!-- 2. Planner App -->
    <div id="app-container" class="app-container" style="display: none;">
        <div class="planner-wrapper">
            <!-- Left Strategy Sidebar -->
            <aside class="strategy-sidebar">
                <div class="card">
                    <span class="section-label">Date</span>
                    <input type="date" id="date">
                </div>

                <!-- 01. Brain Dump -->
                <div class="card">
                    <span class="section-label">01. Brain Dump</span>
                    <input type="text" id="dump-input" data-i18n-placeholder="dump_placeholder">
                    <div id="dump-list" class="chip-pool"></div>
                </div>

                <!-- 02. Priority Matrix -->
                <div class="card">
                    <span class="section-label">02. Priority Matrix</span>
                    <div class="matrix-grid">
                        <div class="matrix-box q1" data-q="q1"><span class="q-tag">URGENT</span><div id="q1-zone" class="drop-zone" data-q="q1"></div></div>
                        <div class="matrix-box q2" data-q="q2"><span class="q-tag">PLAN</span><div id="q2-zone" class="drop-zone" data-q="q2"></div></div>
                        <div class="matrix-box q3" data-q="q3"><span class="q-tag">DELEGATE</span><div id="q3-zone" class="drop-zone" data-q="q3"></div></div>
                        <div class="matrix-box q4" data-q="q4"><span class="q-tag">DELETE</span><div id="q4-zone" class="drop-zone" data-q="q4"></div></div>
                    </div>
                </div>

                <!-- 03. BIG 3 -->
                <div class="card">
                    <span class="section-label">03. Today's BIG 3</span>
                    <div class="big3-modern">
                        <div class="big3-row"><div class="big3-num">1</div><input id="big1"></div>
                        <div class="big3-row"><div class="big3-num">2</div><input id="big2"></div>
                        <div class="big3-row"><div class="big3-num">3</div><input id="big3"></div>
                    </div>
                </div>
            </aside>

            <!-- Right Schedule Main -->
            <main class="main-log card">
                <div class="log-header flex justify-between items-center mb-8">
                    <div>
                        <h2 data-i18n="execution_tag">Daily Schedule</h2>
                        <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mt-2">Precision & Focus</p>
                    </div>
                    <button onclick="addTimeBlock()" class="btn-add">+ NEW TASK</button>
                </div>

                <div id="schedule-list" class="schedule-list">
                    <!-- Dynamic schedule rows -->
                </div>

                <div class="mt-12 flex flex-col items-center">
                    <button id="save-btn" class="btn-primary max-w-sm" onclick="saveData()">FINISH & SAVE TODAY</button>
                    <p class="mt-4 text-[10px] text-gray-400 font-medium italic">"Better Today makes Better Tomorrow"</p>
                </div>
                
                <div style="text-align: right; margin-top: 40px;">
                    <span style="color:#aaa; cursor:pointer; font-size:0.7rem" onclick="logout()">Sign Out</span>
                </div>
            </main>
        </div>
    </div>

    <div id="guide-modal" class="modal"><div class="modal-content card"><span class="close-modal" onclick="closeGuide()">&times;</span><div id="guide-body"></div></div></div>
    
    <script src="main.js"></script>
</body>
</html>
