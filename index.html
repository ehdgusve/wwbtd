<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWBTD Notebook Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="notebook">
        <header>
            <h1>PLANNER</h1>
        </header>

        <div class="section">
            <h2>Date</h2>
            <input type="date" id="date">
        </div>

        <div class="section">
            <h2>BIG 3</h2>
            <div class="big3">
                <input id="big1" placeholder="1. 가장 중요한 목표">
                <input id="big2" placeholder="2. 두 번째 목표">
                <input id="big3" placeholder="3. 세 번째 목표">
            </div>
        </div>

        <div class="section">
            <h2>Note / Focus Plan</h2>
            <textarea id="note" placeholder="메모나 집중 계획을 입력하세요..."></textarea>
        </div>

        <div class="section">
            <h2>Daily Log</h2>
            <div class="table-wrapper">
                <table id="table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Category</th>
                            <th>Task</th>
                            <th>Q</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- rows generated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <button id="save-btn" onclick="saveData()">저장하기</button>

        <hr class="divider">

        <!-- 제휴 문의 섹션 유지 -->
        <section class="contact-section">
            <h2>Affiliate Inquiry</h2>
            <form action="https://formspree.io/f/meerjjdy" method="POST">
                <div class="form-group">
                    <label for="name">성함 / 업체명</label>
                    <input type="text" name="name" id="name" required placeholder="홍길동 / (주)WWBTD">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" name="_replyto" id="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea name="message" id="message" rows="3" required placeholder="제휴 제안 내용을 입력해주세요."></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
