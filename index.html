<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWBTD - Daily Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>WWBTD Planner</h1>
            <p id="current-date"></p>
        </header>
        
        <section class="input-section">
            <input type="text" id="todo-input" placeholder="오늘 할 일을 입력하세요...">
            <button id="add-btn">추가</button>
        </section>

        <section class="list-section">
            <ul id="todo-list">
                <!-- 할 일 목록이 여기에 추가됨 -->
            </ul>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
